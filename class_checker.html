<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>クラスチェッカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg:        #f5f0e8;
    --paper:     #fffef9;
    --ink:       #1a1208;
    --ink-light: #6b5e4a;
    --grid-line: #d4cfc5;
    --shadow:    rgba(30,20,10,0.12);

    /* モード色 */
    --hw-accent:    #c84b2f;
    --hw-bg:        #f5f0e8;
    --hw-header:    #fffef9;

    --sh-accent:    #2e7d4f;
    --sh-bg:        #eef5f1;
    --sh-header:    #f4faf7;

    --mm-accent:    #1a3a6b;
    --mm-bg:        #eef1f8;
    --mm-header:    #f4f6fc;

    /* 動的（JS で切り替え） */
    --mode-accent:  #c84b2f;
    --mode-bg:      #f5f0e8;
    --mode-header:  #fffef9;
    --mode-sub:     #d4cfc5;

    --green: #2e7d4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--mode-bg);
    min-height: 100vh;
    color: var(--ink);
    transition: background 0.25s;
    padding-bottom: 130px;
  }

  /* ═══ HEADER ═══ */
  .header {
    background: var(--mode-header);
    border-bottom: 3px solid var(--ink);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 0 var(--shadow);
    transition: background 0.25s;
  }

  /* タブ */
  .tabs {
    display: flex;
    border-bottom: 2px solid var(--ink);
  }

  .tab-btn {
    flex: 1;
    height: 44px;
    border: none;
    border-right: 2px solid var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    background: var(--bg);
    color: var(--ink-light);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn:last-child { border-right: none; }

  .tab-btn.active-hw { background: var(--hw-accent); color: #fff; }
  .tab-btn.active-sh { background: var(--sh-accent); color: #fff; }
  .tab-btn.active-mm { background: var(--mm-accent); color: #fff; }

  /* 日付・ステータス行 */
  .header-body {
    padding: 12px 18px 10px;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 5px;
  }

  .mode-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--mode-accent);
    border: 1.5px solid var(--mode-accent);
    padding: 2px 7px;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s;
  }

  .date-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .date-display .weekday {
    font-size: 12px;
    font-weight: 400;
    color: var(--mode-accent);
    margin-left: 6px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: color 0.2s;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-chip { font-size: 12px; font-weight: 700; }

  /* 凡例（賞状モードのみ） */
  .legend {
    display: none;
    gap: 8px;
    flex-wrap: wrap;
    padding: 6px 18px 8px;
    border-top: 1px solid var(--mode-sub);
  }
  .legend.visible { display: flex; }

  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--ink-light); font-weight: 700;
  }

  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }

  /* ═══ GRID ═══ */
  .grid-container { padding: 12px 13px; }

  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    color: var(--ink-light); margin-bottom: 10px;
    border-left: 3px solid var(--mode-accent);
    padding-left: 8px;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s;
  }

  .edit-badge {
    font-size: 9px; background: var(--green); color: white;
    padding: 2px 6px; display: none;
  }
  .edit-badge.visible { display: inline-block; }

  .number-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }

  /* ── ボタン共通 ── */
  .num-btn {
    border: 2px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    position: relative;
    transition: transform 0.12s, box-shadow 0.12s, background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 3px 0 var(--ink);
    padding: 5px 3px 4px;
    min-height: 72px;
    gap: 2px;
    overflow: hidden;
  }

  .num-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  .btn-num  { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; line-height: 1; }
  .btn-name { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 9px; font-weight: 700;
              color: var(--ink-light); max-width: 100%; overflow: hidden; text-overflow: ellipsis;
              white-space: nowrap; padding: 0 2px; line-height: 1.2; }
  .btn-sub  { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--ink-light); line-height: 1; }

  /* 編集モード */
  .num-btn.edit-ready {
    border-style: dashed; border-color: var(--green);
    box-shadow: 3px 3px 0 var(--green); background: var(--paper);
  }
  .num-btn.edit-ready::before {
    content: '✎'; position: absolute; top: 2px; left: 4px;
    font-size: 9px; color: var(--green);
  }

  /* ── 宿題: 提出済 ── */
  .num-btn.hw-submitted {
    background: #e8e4dc; border-color: #b8b0a0; color: #b8b0a0; box-shadow: none;
  }
  .num-btn.hw-submitted .btn-num { text-decoration: line-through; }
  .num-btn.hw-submitted .btn-name { color: #b8b0a0; }
  .num-btn.hw-submitted::after {
    content: '✓'; position: absolute; top: 3px; right: 5px;
    font-size: 12px; color: rgba(184,176,160,0.8); font-family: sans-serif;
  }

  /* ── 賞状: 優先度 ── */
  .num-btn.sh-p1 { background: #fff0ed; border-color: #c84b2f; box-shadow: 3px 3px 0 #c84b2f; }
  .num-btn.sh-p1 .btn-sub { color: #c84b2f; font-weight: 700; }
  .num-btn.sh-p2 { background: #fff8ed; border-color: #d4820a; box-shadow: 3px 3px 0 #d4820a; }
  .num-btn.sh-p2 .btn-sub { color: #d4820a; font-weight: 700; }
  .num-btn.sh-p3 { background: #fffbe6; border-color: #b8a000; box-shadow: 3px 3px 0 #b8a000; }
  .num-btn.sh-p3 .btn-sub { color: #b8a000; font-weight: 700; }

  .sh-rank { position: absolute; top: 3px; right: 4px; font-size: 8px; font-weight: 900;
             font-family: 'JetBrains Mono', monospace; }
  .sh-p1 .sh-rank { color: #c84b2f; }
  .sh-p2 .sh-rank { color: #d4820a; }
  .sh-p3 .sh-rank { color: #b8a000; }

  /* ── 賞状: 渡し済み ── */
  .num-btn.sh-given { background: #1d6638; border-color: #1d6638; box-shadow: none; }
  .num-btn.sh-given .btn-num  { color: #fff; }
  .num-btn.sh-given .btn-name { color: rgba(255,255,255,0.72); }
  .num-btn.sh-given .btn-sub  { color: rgba(255,255,255,0.8); font-weight: 700; }
  .num-btn.sh-given::after {
    content: '✓'; position: absolute; top: 3px; right: 5px;
    font-size: 12px; font-weight: 900; color: rgba(255,255,255,0.6); font-family: sans-serif;
  }

  /* ── メモ: 今日あり ── */
  .num-btn.mm-today { background: #1a3a6b; border-color: #1a3a6b; box-shadow: none; }
  .num-btn.mm-today .btn-num  { color: #fff; }
  .num-btn.mm-today .btn-name { color: rgba(255,255,255,0.72); }
  .num-btn.mm-today .btn-sub  { color: rgba(255,255,255,0.8); font-weight: 700; }
  .num-btn.mm-today::after {
    content: '✎'; position: absolute; top: 3px; right: 5px;
    font-size: 11px; color: rgba(255,255,255,0.6);
  }

  /* ── メモ: 過去あり ── */
  .num-btn.mm-past { border-color: #1a3a6b; box-shadow: 3px 3px 0 #1a3a6b; }
  .num-btn.mm-past .btn-sub { color: #1a3a6b; font-weight: 700; }
  .num-btn.mm-past::after {
    content: '✎'; position: absolute; top: 3px; right: 5px;
    font-size: 11px; color: rgba(26,58,107,0.5);
  }

  /* ═══ BOTTOM BAR ═══ */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--paper);
    border-top: 3px solid var(--ink);
    padding: 10px 13px;
    display: flex; gap: 7px;
    box-shadow: 0 -4px 0 var(--shadow);
    transition: background 0.25s;
  }

  .btn {
    flex: 1; height: 50px;
    border: 2px solid var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
    cursor: pointer; transition: all 0.12s;
    box-shadow: 3px 3px 0 var(--ink);
    -webkit-tap-highlight-color: transparent;
    line-height: 1.3;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  .btn-csv   { color: white; flex: 2; }
  .btn-names { background: var(--green); color: white; border-color: var(--green); }
  .btn-hist  { background: var(--ink);   color: white; border-color: var(--ink); }

  /* ═══ MODALS 共通 ═══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,18,8,0.7); z-index: 200; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--paper); width: 100%; max-height: 80vh;
    border-top: 3px solid var(--ink); overflow-y: auto; padding: 18px 16px 36px;
  }

  .modal-title {
    font-size: 15px; font-weight: 900; letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .modal-close {
    font-size: 22px; cursor: pointer; color: var(--ink-light);
    background: none; border: none; padding: 4px 8px;
  }

  /* ─ パスワード ─ */
  .pw-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,18,8,0.75); z-index: 300;
    align-items: center; justify-content: center;
  }
  .pw-overlay.open { display: flex; }

  .pw-box {
    background: var(--paper); border: 3px solid var(--ink);
    padding: 26px 22px 22px; width: 88%; max-width: 340px;
    box-shadow: 6px 6px 0 var(--ink);
  }

  .pw-title { font-size: 14px; font-weight: 900; letter-spacing: 0.08em; margin-bottom: 4px; }
  .pw-sub   { font-size: 11px; color: var(--ink-light); margin-bottom: 14px; }
  .pw-dots  { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }

  .pw-dot {
    width: 15px; height: 15px; border: 2px solid var(--ink);
    border-radius: 50%; background: transparent; transition: background 0.1s;
  }
  .pw-dot.filled { background: var(--ink); }

  .pw-numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }

  .pw-key {
    height: 54px; border: 2px solid var(--ink); background: var(--paper);
    font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;
    cursor: pointer; box-shadow: 2px 2px 0 var(--ink); -webkit-tap-highlight-color: transparent;
    transition: all 0.1s;
  }
  .pw-key:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .pw-key.del    { font-size: 15px; color: var(--ink-light); }
  .pw-key.cancel { font-size: 12px; color: var(--ink-light); font-family: 'Zen Kaku Gothic New', sans-serif; }
  .pw-error { text-align:center; color: #c84b2f; font-size:12px; font-weight:700; margin-top:10px; min-height:18px; }

  /* ─ 名前編集 ─ */
  .ne-box {
    background: var(--paper); border: 3px solid var(--ink);
    padding: 22px 18px 18px; width: 88%; max-width: 340px;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .ne-title { font-size: 14px; font-weight: 900; margin-bottom: 4px; }
  .ne-sub   { font-size: 11px; color: var(--ink-light); margin-bottom: 14px; }

  .ne-input {
    width: 100%; height: 46px; border: 2px solid var(--ink);
    background: var(--bg); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 18px; font-weight: 700; padding: 0 10px; color: var(--ink);
    outline: none; margin-bottom: 12px;
  }
  .ne-input:focus { border-color: var(--green); background: var(--paper); }

  .ne-btns { display: flex; gap: 7px; }
  .ne-btn {
    flex: 1; height: 44px; border: 2px solid var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; box-shadow: 2px 2px 0 var(--ink); -webkit-tap-highlight-color: transparent;
  }
  .ne-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .ne-btn-cancel { background: var(--paper); color: var(--ink-light); }
  .ne-btn-clear  { background: var(--paper); color: #c84b2f; border-color: #c84b2f; }
  .ne-btn-save   { background: var(--green); color: white; border-color: var(--green); flex: 2; }

  /* ─ メモ入力 ─ */
  .memo-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,18,8,0.72); z-index: 250; align-items: flex-end;
  }
  .memo-overlay.open { display: flex; }

  .memo-box {
    background: var(--paper); width: 100%;
    border-top: 3px solid var(--ink); padding: 16px 16px 30px;
  }

  .mm-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .mm-ttl { font-size: 15px; font-weight: 900; }
  .mm-ttl small { font-size: 11px; font-weight: 700; color: var(--ink-light); display: block; margin-top: 2px; }
  .mm-x   { font-size: 22px; color: var(--ink-light); background: none; border: none; cursor: pointer; padding: 0 4px; }

  .mm-tabs {
    display: flex; gap: 5px; margin-bottom: 10px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px;
  }

  .mm-tab {
    flex-shrink: 0; padding: 5px 11px;
    border: 2px solid var(--grid-line); background: var(--bg);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
    cursor: pointer; color: var(--ink-light); -webkit-tap-highlight-color: transparent;
    transition: all 0.1s;
  }
  .mm-tab.has  { border-color: #1a3a6b; color: #1a3a6b; }
  .mm-tab.act  { background: #1a3a6b; color: white; border-color: #1a3a6b; }

  .mm-ta {
    width: 100%; min-height: 120px;
    border: 2px solid var(--ink); background: var(--bg);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 16px; line-height: 1.7;
    padding: 9px 11px; color: var(--ink); outline: none; resize: none; margin-bottom: 10px;
  }
  .mm-ta:focus { border-color: #1a3a6b; background: var(--paper); }

  .mm-btns { display: flex; gap: 7px; }
  .mm-btn {
    flex: 1; height: 44px; border: 2px solid var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; box-shadow: 2px 2px 0 var(--ink); -webkit-tap-highlight-color: transparent;
  }
  .mm-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
  .mm-btn-cancel { background: var(--paper); color: var(--ink-light); }
  .mm-btn-clear  { background: var(--paper); color: #c84b2f; border-color: #c84b2f; }
  .mm-btn-save   { background: #1a3a6b; color: white; border-color: #1a3a6b; flex: 2; }

  /* ─ 履歴 ─ */
  .hist-day {
    border: 1.5px solid var(--grid-line); border-left: 4px solid var(--mode-accent);
    padding: 10px 12px; margin-bottom: 10px; background: var(--bg);
  }
  .hist-date { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .hist-meta { font-size: 11px; color: var(--ink-light); margin-bottom: 5px; }
  .hist-names { font-size: 11px; color: var(--ink-light); word-break: break-all; line-height: 1.8; }
  .hist-names .hl { font-weight: 700; }

  .hist-memo-item { margin-bottom: 7px; padding-bottom: 7px; border-bottom: 1px solid var(--grid-line); }
  .hist-memo-item:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .hist-memo-who  { font-size: 12px; font-weight: 700; color: #1a3a6b; margin-bottom: 2px; }
  .hist-memo-text { font-size: 12px; color: var(--ink); white-space: pre-wrap; line-height: 1.6; }

  .hist-section-title {
    font-size: 12px; font-weight: 900; letter-spacing: 0.1em;
    padding: 10px 0 6px; color: var(--ink-light);
    border-bottom: 1px solid var(--grid-line); margin-bottom: 8px;
  }

  .hist-empty { text-align:center; color: var(--ink-light); padding:24px; font-size:13px; }

  .btn-export-all {
    width: 100%; height: 46px; background: var(--ink); color: var(--paper);
    border: none; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 14px; letter-spacing: 0.08em;
  }
  .btn-export-all:active { opacity: 0.8; }

  /* トースト */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 9px 18px;
    font-size: 13px; font-weight: 700; z-index: 400; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* グリッド背景線 */
  .bg-lines {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, var(--mode-sub) 39px, var(--mode-sub) 40px);
    transition: background-image 0.25s;
  }
  .grid-container, .header, .bottom-bar { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="bg-lines" id="bgLines"></div>

<!-- ═══ HEADER ═══ -->
<div class="header" id="mainHeader">
  <div class="tabs">
    <button class="tab-btn" id="tab-hw" onclick="switchMode('hw')">📝 宿題</button>
    <button class="tab-btn" id="tab-sh" onclick="switchMode('sh')">🏆 賞状</button>
    <button class="tab-btn" id="tab-mm" onclick="switchMode('mm')">✎ メモ</button>
  </div>
  <div class="header-body">
    <div class="header-top">
      <span class="mode-label" id="modeLabel">宿題</span>
      <div class="date-display">
        <span id="dateStr">--</span>
        <span class="weekday" id="weekdayStr">--</span>
      </div>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>
  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#fff0ed;border:1.5px solid #c84b2f"></div>最優先</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff8ed;border:1.5px solid #d4820a"></div>優先</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fffbe6;border:1.5px solid #b8a000"></div>やや優先</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1d6638;border:1.5px solid #1d6638"></div>本日渡し済</div>
  </div>
</div>

<!-- ═══ GRID ═══ -->
<div class="grid-container">
  <div class="section-label">
    出席番号
    <span class="edit-badge" id="editBadge">✎ 名前編集モード</span>
  </div>
  <div class="number-grid" id="numGrid"></div>
</div>

<!-- ═══ BOTTOM BAR ═══ -->
<div class="bottom-bar">
  <button class="btn btn-csv" id="btnCsv" onclick="saveAndExportToday()">保存 &amp; CSV</button>
  <button class="btn btn-names" id="btnNames" onclick="requestEditMode()">名前編集</button>
  <button class="btn btn-hist" onclick="openHistory()">履歴</button>
</div>

<!-- メモ入力 -->
<div class="memo-overlay" id="memoOverlay">
  <div class="memo-box">
    <div class="mm-hdr">
      <div class="mm-ttl"><span id="mmTitle">--番</span><small id="mmName"></small></div>
      <button class="mm-x" onclick="closeMemo()">×</button>
    </div>
    <div class="mm-tabs" id="mmTabs"></div>
    <textarea class="mm-ta" id="mmTa" placeholder="メモを入力…"></textarea>
    <div class="mm-btns">
      <button class="mm-btn mm-btn-cancel" onclick="closeMemo()">キャンセル</button>
      <button class="mm-btn mm-btn-clear"  onclick="clearMemoInput()">削除</button>
      <button class="mm-btn mm-btn-save"   onclick="saveMemo()">保存</button>
    </div>
  </div>
</div>

<!-- 履歴 -->
<div class="modal-overlay" id="histModal">
  <div class="modal">
    <div class="modal-title"><span id="histTitle">履歴</span><button class="modal-close" onclick="closeHistory()">×</button></div>
    <div id="histList"></div>
    <button class="btn-export-all" onclick="exportAllCSV()">📥 全履歴をCSVで一括出力</button>
  </div>
</div>

<!-- パスワード -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-title">🔒 パスワードを入力</div>
    <div class="pw-sub">名前の編集には認証が必要です</div>
    <div class="pw-dots"><div class="pw-dot" id="d0"></div><div class="pw-dot" id="d1"></div><div class="pw-dot" id="d2"></div><div class="pw-dot" id="d3"></div></div>
    <div class="pw-numpad">
      <button class="pw-key" onclick="pwKey('1')">1</button>
      <button class="pw-key" onclick="pwKey('2')">2</button>
      <button class="pw-key" onclick="pwKey('3')">3</button>
      <button class="pw-key" onclick="pwKey('4')">4</button>
      <button class="pw-key" onclick="pwKey('5')">5</button>
      <button class="pw-key" onclick="pwKey('6')">6</button>
      <button class="pw-key" onclick="pwKey('7')">7</button>
      <button class="pw-key" onclick="pwKey('8')">8</button>
      <button class="pw-key" onclick="pwKey('9')">9</button>
      <button class="pw-key cancel" onclick="closePw()">キャンセル</button>
      <button class="pw-key" onclick="pwKey('0')">0</button>
      <button class="pw-key del" onclick="pwDel()">⌫</button>
    </div>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<!-- 名前編集 -->
<div class="pw-overlay" id="neOverlay">
  <div class="ne-box">
    <div class="ne-title" id="neTitle">--番</div>
    <div class="ne-sub">名前を入力（空欄＋保存で削除）</div>
    <input class="ne-input" type="text" id="neInput" maxlength="6" placeholder="例：田中">
    <div class="ne-btns">
      <button class="ne-btn ne-btn-cancel" onclick="closeNe()">キャンセル</button>
      <button class="ne-btn ne-btn-clear"  onclick="clearNeName()">削除</button>
      <button class="ne-btn ne-btn-save"   onclick="saveNeName()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════
   定数・グローバル
════════════════════════════════════════ */
const TOTAL     = 30;
const WEEKDAYS  = ['日','月','火','水','木','金','土'];
const PASSWORD  = '3497';
const PRIORITY_N = 5;

// ストレージキー
const KEY_NAMES = 'cc_names_v1';
const KEY_HW    = 'cc_hw_v1';    // { 'YYYY-MM-DD': [番号, ...] }
const KEY_SH    = 'cc_sh_v1';    // { 'YYYY-MM-DD': { given:[番号, ...] } }
const KEY_MM    = 'cc_mm_v1';    // { 'YYYY-MM-DD': { num: 'text', ... } }

// モード設定
const MODES = {
  hw: { label:'宿題',  accent:'#c84b2f', bg:'#f5f0e8', header:'#fffef9', sub:'#d4cfc5', csvColor:'#c84b2f' },
  sh: { label:'賞状',  accent:'#2e7d4f', bg:'#eef5f1', header:'#f4faf7', sub:'#c5ddd0', csvColor:'#2e7d4f' },
  mm: { label:'メモ',  accent:'#1a3a6b', bg:'#eef1f8', header:'#f4f6fc', sub:'#c5cfe0', csvColor:'#1a3a6b' },
};

let mode       = 'hw';
let names      = {};
let editMode   = false;
let pwBuf      = '';
let neTarget   = null;
let memoTarget = null;
let memoDate   = null;

/* ════════════════════════════════════════
   ストレージ
════════════════════════════════════════ */
const ls = {
  get: (k, def={}) => { try { return JSON.parse(localStorage.getItem(k) || 'null') ?? def; } catch { return def; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
};

/* ════════════════════════════════════════
   日付
════════════════════════════════════════ */
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtJP(k) {
  const [y,m,d] = k.split('-');
  return `${y}年${m}月${d}日（${WEEKDAYS[new Date(+y,+m-1,+d).getDay()]}）`;
}
function fmtShort(k) { const [,m,d]=k.split('-'); return `${+m}/${+d}`; }

function initDate() {
  const d = new Date(), key = today(), [y,m,dy] = key.split('-');
  document.getElementById('dateStr').textContent    = `${y}.${m}.${dy}`;
  document.getElementById('weekdayStr').textContent = WEEKDAYS[d.getDay()]+'曜日';
}

/* ════════════════════════════════════════
   モード切替
════════════════════════════════════════ */
function switchMode(m) {
  mode = m;
  editMode = false;

  // CSS変数
  const cfg = MODES[m];
  const root = document.documentElement.style;
  root.setProperty('--mode-accent', cfg.accent);
  root.setProperty('--mode-bg',     cfg.bg);
  root.setProperty('--mode-header', cfg.header);
  root.setProperty('--mode-sub',    cfg.sub);
  document.body.style.background = cfg.bg;

  // タブアクティブ
  ['hw','sh','mm'].forEach(id => {
    document.getElementById('tab-'+id).className =
      'tab-btn' + (id===m ? ' active-'+id : '');
  });

  // ラベル・CSV ボタン色
  document.getElementById('modeLabel').textContent = cfg.label;
  document.getElementById('btnCsv').style.background  = cfg.csvColor;
  document.getElementById('btnCsv').style.borderColor = cfg.csvColor;

  // 賞状モードのみ凡例表示
  document.getElementById('legend').classList.toggle('visible', m==='sh');

  buildGrid();
}

/* ════════════════════════════════════════
   グリッド描画（モード別）
════════════════════════════════════════ */
function buildGrid() {
  const grid = document.getElementById('numGrid');
  grid.innerHTML = '';

  let statsToday = 0, statsInfo = '';

  if (mode === 'hw') {
    const data = ls.get(KEY_HW, {});
    const submitted = new Set(data[today()] || []);
    statsToday = submitted.size;
    statsInfo  = `提出済 <b style="color:#c84b2f">${submitted.size}</b>人 ／ 未提出 <b style="color:#2a6496">${TOTAL-submitted.size}</b>人`;

    for (let i=1;i<=TOTAL;i++) {
      const btn = makeBtn(i);
      if (editMode) { btn.classList.add('edit-ready'); }
      else if (submitted.has(i)) { btn.classList.add('hw-submitted'); }
      btn.addEventListener('click', ()=>{ editMode ? openNe(i) : toggleHw(i); });
      grid.appendChild(btn);
    }
  }

  else if (mode === 'sh') {
    const data     = ls.get(KEY_SH, {});
    const todayGiven = new Set((data[today()]?.given)||[]);

    // 全生徒の最終渡し日集計
    const lastDate = {};
    Object.entries(data).forEach(([dt,rec]) => {
      (rec.given||[]).forEach(n => {
        if (!lastDate[n]||dt>lastDate[n]) lastDate[n]=dt;
      });
    });

    // 優先度計算
    const sorted = [];
    for (let i=1;i<=TOTAL;i++) if (!todayGiven.has(i)) sorted.push(i);
    sorted.sort((a,b)=>{
      const ka=lastDate[a]||'0000', kb=lastDate[b]||'0000';
      return ka<kb?-1:ka>kb?1:0;
    });
    const priMap = {};
    sorted.slice(0,PRIORITY_N).forEach((n,idx)=>priMap[n]=idx+1);

    statsToday = todayGiven.size;
    statsInfo  = `本日 <b style="color:#2e7d4f">${todayGiven.size}</b>枚 ／ 優先 <b style="color:#c84b2f">${Math.min(PRIORITY_N, sorted.length)}</b>人`;

    for (let i=1;i<=TOTAL;i++) {
      const btn = makeBtn(i);
      const pri = priMap[i];

      if (editMode) { btn.classList.add('edit-ready'); }
      else if (todayGiven.has(i)) {
        btn.classList.add('sh-given');
        addSub(btn, lastDate[i] ? fmtShort(lastDate[i]) : '');
      } else if (pri===1||pri===2||pri===3) {
        btn.classList.add('sh-p'+pri);
        const rb = document.createElement('span');
        rb.className = 'sh-rank'; rb.textContent = '★'+pri;
        btn.appendChild(rb);
        addSub(btn, lastDate[i] ? fmtShort(lastDate[i]) : '未渡し');
      } else {
        addSub(btn, lastDate[i] ? fmtShort(lastDate[i]) : '未渡し');
      }
      btn.addEventListener('click', ()=>{ editMode ? openNe(i) : toggleSh(i); });
      grid.appendChild(btn);
    }
  }

  else if (mode === 'mm') {
    const data = ls.get(KEY_MM, {});
    const todayData = data[today()] || {};

    let todayCnt = 0;
    // 各生徒の最終メモ日
    const lastMemo = {};
    Object.entries(data).forEach(([dt,dd])=>{
      Object.entries(dd).forEach(([n,txt])=>{
        if (txt&&txt.trim()) {
          const num=+n;
          if (!lastMemo[num]||dt>lastMemo[num]) lastMemo[num]=dt;
        }
      });
    });

    for (let i=1;i<=TOTAL;i++) {
      if (todayData[i]&&todayData[i].trim()) todayCnt++;
    }

    statsInfo = `今日のメモ <b style="color:#1a3a6b">${todayCnt}</b>件`;

    for (let i=1;i<=TOTAL;i++) {
      const btn = makeBtn(i);
      const hasToday = todayData[i]&&todayData[i].trim();
      const hasPast  = lastMemo[i];

      if (editMode) { btn.classList.add('edit-ready'); }
      else if (hasToday) {
        btn.classList.add('mm-today');
        addSub(btn, fmtShort(today()));
      } else if (hasPast) {
        btn.classList.add('mm-past');
        addSub(btn, fmtShort(lastMemo[i]));
      }
      btn.addEventListener('click', ()=>{ editMode ? openNe(i) : openMemo(i); });
      grid.appendChild(btn);
    }
  }

  document.getElementById('statusBar').innerHTML = statsInfo;

  // 編集バッジ・ボタン
  document.getElementById('editBadge').classList.toggle('visible', editMode);
  const bn = document.getElementById('btnNames');
  bn.textContent       = editMode ? '編集終了' : '名前編集';
  bn.style.background  = editMode ? 'var(--ink)' : 'var(--green)';
  bn.style.borderColor = editMode ? 'var(--ink)' : 'var(--green)';
}

/* ボタン共通パーツ */
function makeBtn(i) {
  const btn = document.createElement('button');
  btn.className = 'num-btn';

  const ns = document.createElement('span');
  ns.className = 'btn-num'; ns.textContent = i;
  btn.appendChild(ns);

  if (names[i]) {
    const nm = document.createElement('span');
    nm.className = 'btn-name'; nm.textContent = names[i];
    btn.appendChild(nm);
  }
  return btn;
}

function addSub(btn, text) {
  const s = document.createElement('span');
  s.className = 'btn-sub'; s.textContent = text;
  btn.appendChild(s);
}

/* ════════════════════════════════════════
   宿題ロジック
════════════════════════════════════════ */
function toggleHw(n) {
  const data = ls.get(KEY_HW, {});
  const t = today();
  if (!data[t]) data[t] = [];
  const idx = data[t].indexOf(n);
  if (idx>=0) data[t].splice(idx,1);
  else        data[t].push(n);
  ls.set(KEY_HW, data);
  buildGrid();
}

/* ════════════════════════════════════════
   賞状ロジック
════════════════════════════════════════ */
function toggleSh(n) {
  const data = ls.get(KEY_SH, {});
  const t = today();
  if (!data[t]) data[t] = { given:[] };
  const arr=data[t].given, idx=arr.indexOf(n);
  if (idx>=0) { arr.splice(idx,1); showToast(`${lbl(n)} の賞状を取り消しました`); }
  else        { arr.push(n);       showToast(`🏆 ${lbl(n)} に賞状を渡しました！`); }
  ls.set(KEY_SH, data);
  buildGrid();
}

/* ════════════════════════════════════════
   メモロジック
════════════════════════════════════════ */
function openMemo(n) {
  memoTarget = n;
  memoDate   = today();
  document.getElementById('mmTitle').textContent = `${n}番`;
  document.getElementById('mmName').textContent  = names[n]||'';
  renderMemoTabs(n);
  renderMemoTa(n, memoDate);
  document.getElementById('memoOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mmTa').focus(), 150);
}

function renderMemoTabs(n) {
  const data = ls.get(KEY_MM, {}), t = today();
  const dates = new Set([t]);
  Object.entries(data).forEach(([dt,dd])=>{ if (dd[n]&&dd[n].trim()) dates.add(dt); });
  const sorted = [...dates].sort().reverse();
  const tabs = document.getElementById('mmTabs');
  tabs.innerHTML='';
  sorted.forEach(dt=>{
    const tab = document.createElement('button');
    tab.className='mm-tab';
    const has = data[dt]&&data[dt][n]&&data[dt][n].trim();
    if (has) tab.classList.add('has');
    if (dt===memoDate) tab.classList.add('act');
    tab.textContent = dt===t ? `今日 ${fmtShort(dt)}` : fmtShort(dt);
    tab.addEventListener('click',()=>{ memoDate=dt; renderMemoTabs(n); renderMemoTa(n,dt); });
    tabs.appendChild(tab);
  });
}

function renderMemoTa(n, dt) {
  const data = ls.get(KEY_MM, {});
  const ta = document.getElementById('mmTa');
  ta.value = data[dt]?.[n] || '';
  const isToday = dt===today();
  ta.readOnly   = !isToday;
  ta.placeholder = isToday ? 'メモを入力…' : '（過去の記録）';
  ta.style.opacity = isToday ? '1' : '0.7';
}

function closeMemo() {
  document.getElementById('memoOverlay').classList.remove('open');
  memoTarget = null; memoDate = null;
}

function clearMemoInput() { document.getElementById('mmTa').value = ''; }

function saveMemo() {
  if (!memoTarget) return;
  if (memoDate !== today()) { showToast('過去の日付は編集できません'); return; }
  const text = document.getElementById('mmTa').value.trim();
  const data = ls.get(KEY_MM, {});
  const t    = today();
  if (!data[t]) data[t]={};
  if (text) data[t][memoTarget]=text;
  else      { delete data[t][memoTarget]; if (!Object.keys(data[t]).length) delete data[t]; }
  ls.set(KEY_MM, data);
  closeMemo();
  buildGrid();
  showToast(text ? `${lbl(memoTarget)} のメモを保存しました` : `${lbl(memoTarget)} のメモを削除しました`);
}

/* ════════════════════════════════════════
   CSV出力
════════════════════════════════════════ */
function saveAndExportToday() {
  const t = today();
  // 今日分を各ストレージに確保して保存
  const hw = ls.get(KEY_HW,{}); if(!hw[t]) hw[t]=[]; ls.set(KEY_HW,hw);
  const sh = ls.get(KEY_SH,{}); if(!sh[t]) sh[t]={given:[]}; ls.set(KEY_SH,sh);
  const mm = ls.get(KEY_MM,{}); if(!mm[t]) mm[t]={}; ls.set(KEY_MM,mm);

  const keys = [t];
  downloadCombinedCSV(keys);
  showToast('保存・CSV出力しました');
}

function exportAllCSV() {
  const hw = ls.get(KEY_HW,{}), sh = ls.get(KEY_SH,{}), mm = ls.get(KEY_MM,{});
  const allKeys = new Set([...Object.keys(hw),...Object.keys(sh),...Object.keys(mm)]);
  const keys = [...allKeys].sort();
  if (!keys.length) { showToast('記録がありません'); return; }
  downloadCombinedCSV(keys);
  showToast('全履歴をCSV出力しました');
}

function downloadCombinedCSV(keys) {
  const hw = ls.get(KEY_HW,{}), sh = ls.get(KEY_SH,{}), mm = ls.get(KEY_MM,{});
  let csv = '\uFEFF--- 宿題チェック ---\n';
  csv += '日付,提出人数,未提出人数,提出(番号/名前),未提出(番号/名前)\n';
  keys.forEach(k=>{
    const submitted = hw[k]||[];
    const notSub = [];
    for(let i=1;i<=TOTAL;i++) if(!submitted.includes(i)) notSub.push(i);
    csv += `${fmtJP(k)},${submitted.length},${notSub.length},"${submitted.map(lbl).join(' ')}","${notSub.map(lbl).join(' ')}"\n`;
  });

  csv += '\n--- 賞状チェック ---\n';
  csv += '日付,渡した人数,渡した生徒(番号/名前)\n';
  keys.forEach(k=>{
    const given = (sh[k]?.given||[]).sort((a,b)=>a-b);
    csv += `${fmtJP(k)},${given.length},"${given.map(lbl).join(' ')}"\n`;
  });

  csv += '\n--- メモ ---\n';
  csv += '日付,出席番号,名前,メモ\n';
  keys.forEach(k=>{
    const dd = mm[k]||{};
    const nums = Object.keys(dd).map(Number).sort((a,b)=>a-b).filter(n=>dd[n]&&dd[n].trim());
    if (!nums.length) {
      csv += `${fmtJP(k)},,,（メモなし）\n`;
    } else {
      nums.forEach(n=>{ csv += `${fmtJP(k)},${n},${names[n]||''},"${(dd[n]||'').replace(/\n/g,'  ')}"\n`; });
    }
  });

  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download = keys.length===1 ? `クラスチェック_${keys[0]}.csv` : 'クラスチェック_全履歴.csv';
  a.click(); URL.revokeObjectURL(url);
}

/* ════════════════════════════════════════
   履歴モーダル
════════════════════════════════════════ */
function openHistory() {
  const hw=ls.get(KEY_HW,{}), sh=ls.get(KEY_SH,{}), mm=ls.get(KEY_MM,{});
  const allKeys = new Set([...Object.keys(hw),...Object.keys(sh),...Object.keys(mm)]);
  const keys = [...allKeys].sort().reverse();
  const list = document.getElementById('histList');
  document.getElementById('histTitle').textContent = '履歴';

  if (!keys.length) {
    list.innerHTML='<div class="hist-empty">まだ記録がありません</div>';
  } else {
    list.innerHTML = keys.map(k=>{
      let html = `<div class="hist-day" style="border-left-color:var(--mode-accent)">
        <div class="hist-date">${fmtJP(k)}</div>`;

      // 宿題
      const sub = hw[k]||[];
      const notSub=[];
      for(let i=1;i<=TOTAL;i++) if(!sub.includes(i)) notSub.push(i);
      html += `<div class="hist-section-title">📝 宿題 — 提出${sub.length}人</div>
        <div class="hist-names">`;
      if (notSub.length) html += `未提出: ${notSub.map(n=>`<span class="hl" style="color:#c84b2f">${lbl(n)}</span>`).join(' ')}`;
      else               html += `<span style="color:#2e7d4f">全員提出済 🎉</span>`;
      html += `</div>`;

      // 賞状
      const given=(sh[k]?.given||[]).sort((a,b)=>a-b);
      html += `<div class="hist-section-title" style="margin-top:8px">🏆 賞状 — ${given.length}枚</div>
        <div class="hist-names">`;
      if (given.length) html += given.map(n=>`<span class="hl" style="color:#2e7d4f">${lbl(n)}</span>`).join(' ');
      else              html += '（なし）';
      html += `</div>`;

      // メモ
      const dd=mm[k]||{};
      const mNums=Object.keys(dd).map(Number).sort((a,b)=>a-b).filter(n=>dd[n]&&dd[n].trim());
      html += `<div class="hist-section-title" style="margin-top:8px">✎ メモ — ${mNums.length}件</div>`;
      if (mNums.length) {
        html += mNums.map(n=>`
          <div class="hist-memo-item">
            <div class="hist-memo-who">${lbl(n)}</div>
            <div class="hist-memo-text">${esc(dd[n])}</div>
          </div>`).join('');
      } else {
        html += `<div class="hist-names">（なし）</div>`;
      }

      html += `</div>`;
      return html;
    }).join('');
  }

  document.getElementById('histModal').classList.add('open');
}

function closeHistory() { document.getElementById('histModal').classList.remove('open'); }

/* ════════════════════════════════════════
   パスワード
════════════════════════════════════════ */
function requestEditMode() {
  if (editMode) { editMode=false; buildGrid(); showToast('名前編集モードを終了しました'); return; }
  pwBuf=''; updateDots();
  document.getElementById('pwError').textContent='';
  document.getElementById('pwOverlay').classList.add('open');
}

function closePw() { pwBuf=''; updateDots(); document.getElementById('pwOverlay').classList.remove('open'); }

function pwKey(k) {
  if (pwBuf.length>=4) return;
  pwBuf+=k; updateDots();
  if (pwBuf.length===4) {
    setTimeout(()=>{
      if (pwBuf===PASSWORD) {
        document.getElementById('pwOverlay').classList.remove('open');
        editMode=true; buildGrid(); showToast('名前編集モードに入りました');
      } else {
        document.getElementById('pwError').textContent='パスワードが違います';
        pwBuf=''; updateDots();
      }
    },150);
  }
}

function pwDel() {
  if (!pwBuf.length) return;
  pwBuf=pwBuf.slice(0,-1); updateDots();
  document.getElementById('pwError').textContent='';
}

function updateDots() {
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pwBuf.length);
}

/* ════════════════════════════════════════
   名前編集
════════════════════════════════════════ */
function openNe(n) {
  neTarget=n;
  document.getElementById('neTitle').textContent=`${n}番${names[n]?'（現在：'+names[n]+'）':'（未設定）'}`;
  document.getElementById('neInput').value=names[n]||'';
  document.getElementById('neOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('neInput').focus(),120);
}

function closeNe() { document.getElementById('neOverlay').classList.remove('open'); neTarget=null; }

function saveNeName() {
  if (!neTarget) return;
  const val=document.getElementById('neInput').value.trim();
  if (val) names[neTarget]=val; else delete names[neTarget];
  ls.set(KEY_NAMES,names); closeNe(); buildGrid();
  showToast(val?`${neTarget}番「${val}」を登録しました`:`${neTarget}番の名前を削除しました`);
}

function clearNeName() {
  if (!neTarget) return;
  delete names[neTarget]; ls.set(KEY_NAMES,names); closeNe(); buildGrid();
  showToast(`${neTarget}番の名前を削除しました`);
}

/* ════════════════════════════════════════
   ユーティリティ
════════════════════════════════════════ */
function lbl(n) { return names[n]?`${n}(${names[n]})`:String(n); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

/* ════════════════════════════════════════
   モーダル外タップ
════════════════════════════════════════ */
['histModal','neOverlay','memoOverlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this){
      if(id==='histModal')   closeHistory();
      if(id==='neOverlay')   closeNe();
      if(id==='memoOverlay') closeMemo();
    }
  });
});

document.getElementById('neInput').addEventListener('keydown',e=>{ if(e.key==='Enter') saveNeName(); });

/* ════════════════════════════════════════
   初期化
════════════════════════════════════════ */
names = ls.get(KEY_NAMES, {});
initDate();
switchMode('hw');
</script>
</body>
</html>
